# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name moltgame.com api.moltgame.com ws.moltgame.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main site
server {
    listen 443 ssl;
    http2 on;
    server_name moltgame.com;

    ssl_certificate /etc/letsencrypt/live/moltgame.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moltgame.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://frontend_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API Gateway
server {
    listen 443 ssl;
    http2 on;
    server_name api.moltgame.com;

    ssl_certificate /etc/letsencrypt/live/moltgame.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moltgame.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # API rate limiting
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS handled by Go, but pass through
        proxy_hide_header Access-Control-Allow-Origin;
    }

    location /health {
        proxy_pass http://api_backend;
    }
}

# WebSocket Gateway
server {
    listen 443 ssl;
    http2 on;
    server_name ws.moltgame.com;

    ssl_certificate /etc/letsencrypt/live/moltgame.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moltgame.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # WebSocket connections
    location /ws/ {
        limit_req zone=ws burst=10 nodelay;

        proxy_pass http://ws_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /health {
        proxy_pass http://ws_backend;
    }
}
