services:
  # --- Infrastructure ---
  postgres:
    image: postgres:17-alpine
    container_name: moltgame-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-moltgame}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-moltgame}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-moltgame}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: moltgame-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nats:
    image: nats:2-alpine
    container_name: moltgame-nats
    restart: unless-stopped
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --- Backend ---
  api-gateway:
    build:
      context: ./backend
      target: api-gateway
    container_name: moltgame-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3011:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-moltgame}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-moltgame}
      REDIS_ADDR: redis:6379
      NATS_ADDR: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AI_MODEL_ID: ${AI_MODEL_ID:-google/gemini-3.1-flash-lite-preview}
      TWITTER_CLIENT_ID: ${TWITTER_CLIENT_ID}
      TWITTER_CLIENT_SECRET: ${TWITTER_CLIENT_SECRET}
      TWITTER_CALLBACK_URL: ${TWITTER_CALLBACK_URL}
      TWITTER_API_KEY: ${TWITTER_API_KEY}
      TWITTER_API_KEY_SECRET: ${TWITTER_API_KEY_SECRET}
      TWITTER_ACCESS_TOKEN: ${TWITTER_ACCESS_TOKEN}
      TWITTER_ACCESS_TOKEN_SECRET: ${TWITTER_ACCESS_TOKEN_SECRET}
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      poker-engine:
        condition: service_started
    networks:
      - internal

  poker-engine:
    build:
      context: ./backend
      target: poker-engine
    container_name: moltgame-poker
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-moltgame}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-moltgame}
      NATS_ADDR: nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal

  ws-gateway:
    build:
      context: ./backend
      target: ws-gateway
    container_name: moltgame-ws
    restart: unless-stopped
    ports:
      - "127.0.0.1:3012:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-moltgame}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-moltgame}
      NATS_ADDR: nats://nats:4222
      PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - internal

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://game.0ai.ai}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://game.0ai.ai}
    container_name: moltgame-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  nats_data:

networks:
  internal:
    driver: bridge
