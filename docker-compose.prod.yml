services:
  # --- Infrastructure ---
  postgres:
    image: postgres:17-alpine
    container_name: moltgame-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-moltgame}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-moltgame}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-moltgame}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: moltgame-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nats:
    image: nats:2-alpine
    container_name: moltgame-nats
    restart: unless-stopped
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --- Backend ---
  api-gateway:
    build:
      context: ./backend
      target: api-gateway
    container_name: moltgame-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${DB_USER:-moltgame}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-moltgame}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NATS_URL: nats://nats:4222
      TWITTER_API_KEY: ${TWITTER_API_KEY}
      TWITTER_API_SECRET: ${TWITTER_API_SECRET}
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      poker-engine:
        condition: service_started
    networks:
      - internal

  poker-engine:
    build:
      context: ./backend
      target: poker-engine
    container_name: moltgame-poker
    restart: unless-stopped
    environment:
      NATS_ADDR: nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - internal

  ws-gateway:
    build:
      context: ./backend
      target: ws-gateway
    container_name: moltgame-ws
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${DB_USER:-moltgame}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-moltgame}?sslmode=disable
      NATS_URL: nats://nats:4222
      PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - internal

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      target: runner
    container_name: moltgame-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.moltgame.com
      NEXT_PUBLIC_WS_URL: wss://ws.moltgame.com
    networks:
      - internal

  # --- Reverse Proxy ---
  nginx:
    image: nginx:1.27-alpine
    container_name: moltgame-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api-gateway
      - ws-gateway
      - frontend
    networks:
      - internal

  certbot:
    image: certbot/certbot
    container_name: moltgame-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  nats_data:
  certbot_data:
  certbot_www:

networks:
  internal:
    driver: bridge
